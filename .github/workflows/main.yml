name: Aggiorna annunci MV Cars

on:
  schedule:
    - cron: '0 */6 * * *'   # ogni 6 ore
  workflow_dispatch:          # avvio manuale dal pannello Actions
  push:
    branches: [main]

jobs:
  scrape:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Installa dipendenze
        run: npm ci

      - name: Esegui scraper
        run: node scripts/scrape.js

      - name: Commit e push (se ci sono novità)
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          git diff --cached --quiet && echo "Nessuna modifica." || \
            (git commit -m "chore: aggiorna annunci MV Cars [skip ci]" && git push)
