name: Aggiorna annunci MV Cars

on:
  schedule:
    - cron: '0 */6 * * *'   # ogni 6 ore
  workflow_dispatch:          # avvio manuale dal pannello Actions
  push:
    branches: [main]

jobs:
  scrape:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: requirements.txt

      - name: Installa dipendenze Python
        run: pip install -r requirements.txt

      - name: Esegui scraper
        run: python3 scripts/scrape.py

      - name: Commit e push (se ci sono novità)
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          git diff --cached --quiet && echo "Nessuna modifica." || \
            (git commit -m "chore: aggiorna annunci MV Cars [skip ci]" && git push)
